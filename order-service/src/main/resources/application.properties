spring.application.name=order-service
server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka


resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=20s

resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.userService.sliding-window-size=10



spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1